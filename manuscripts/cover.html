<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>表紙(ラスタライズ元)</title>
    <!--
      表紙画像(assets/cover.png)の生成元。Chromium で 1748×2480px(A5・300dpi)
      にスクリーンショットして assets/cover.png を作る(scripts/build-cover.sh)。
      構図: 上2/3=白地にタイトル主役 / 下1/3=ブループリント地にミニ構成図。
      SVG 座標系は viewBox="0 0 148 210"(A5 を mm で扱う)。
    -->
    <style>
      html, body { margin: 0; padding: 0; background: #ffffff; }
      svg { display: block; width: 1748px; height: 2480px; }
    </style>
  </head>
  <body>
    <svg
      viewBox="0 0 148 210"
      xmlns="http://www.w3.org/2000/svg"
      font-family="'Hiragino Kaku Gothic ProN','Noto Sans CJK JP','Yu Gothic','Meiryo',sans-serif"
    >
      <defs>
        <linearGradient id="bgstrip" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#0c4680" />
          <stop offset="1" stop-color="#07264a" />
        </linearGradient>
        <pattern id="grid-minor" width="4" height="4" patternUnits="userSpaceOnUse">
          <path d="M4 0H0V4" fill="none" stroke="#8fc3ff" stroke-width="0.12" stroke-opacity="0.14" />
        </pattern>
        <pattern id="grid-major" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M20 0H0V20" fill="none" stroke="#8fc3ff" stroke-width="0.2" stroke-opacity="0.26" />
        </pattern>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M0 1L9 5L0 9" fill="none" stroke="#8fd0ff" stroke-width="1.6" />
        </marker>
      </defs>

      <!-- ===== 上2/3: 白地・タイトル ===== -->
      <rect x="0" y="0" width="148" height="210" fill="#ffffff" />

      <!-- 細い上罫 -->
      <rect x="0" y="0" width="148" height="2.4" fill="#0a5ca8" />

      <text x="16" y="46" font-size="4.8" letter-spacing="0.4"><tspan fill="#0a5ca8" font-weight="bold">AWS 経験者</tspan><tspan fill="#40638a">のための</tspan></text>

      <!-- タイトル(主役・背景色の青で特大) -->
      <text x="15" y="74" fill="#0a5ca8" font-size="23" font-weight="bold" letter-spacing="0.2">Azure</text>
      <text x="15" y="100" fill="#0a5ca8" font-size="23" font-weight="bold" letter-spacing="1.5">実践入門</text>

      <!-- 巻バッジ -->
      <rect x="16" y="108" width="33" height="9.2" rx="1.4" fill="#0a5ca8" />
      <text x="32.5" y="114.5" fill="#ffffff" font-size="4.4" font-weight="bold" text-anchor="middle">共通基礎編</text>


      <!-- ===== 下1/3: ブループリント地・ミニ構成図 ===== -->
      <g>
        <rect x="0" y="140" width="148" height="70" fill="url(#bgstrip)" />
        <rect x="0" y="140" width="148" height="70" fill="url(#grid-minor)" />
        <rect x="0" y="140" width="148" height="70" fill="url(#grid-major)" />
        <rect x="0" y="140" width="148" height="0.5" fill="#4db8ff" />

        <text x="16" y="150.2" fill="#d7e8ff" font-size="2.9">Azure の ID・統制・ネットワーク・監視を、手を動かしながら一つずつ組み上げる。</text>

        <!-- 構成図: Entra ID →(RBAC)→ 管理グループ/サブスクリプション(VNet) →(logs)→ Log Analytics -->
        <!-- 左: Entra ID(ID) -->
        <rect x="15" y="171" width="22" height="18" rx="1.4" fill="#4aa3ff" fill-opacity="0.06" stroke="#9cccf5" stroke-width="0.4" />
        <g stroke="#8fd0ff" stroke-width="0.5" fill="none">
          <circle cx="22.5" cy="178.5" r="2" />
          <path d="M24.5 178.5H29M27.5 178.5V180.5" />
        </g>
        <text x="26" y="186.5" fill="#dce9fb" font-size="2.2" text-anchor="middle">Entra ID</text>

        <!-- RBAC 矢印 -->
        <path d="M37 180H44" fill="none" stroke="#8fd0ff" stroke-width="0.4" marker-end="url(#arrow)" />
        <text x="40.5" y="178" fill="#9cc7f5" font-size="1.7" text-anchor="middle">RBAC</text>

        <!-- 中央: 管理グループ枠 -->
        <rect x="45" y="157" width="58" height="37" rx="1.8" fill="#4aa3ff" fill-opacity="0.05" stroke="#7fb8f0" stroke-width="0.4" stroke-dasharray="2 1.4" />
        <text x="47.5" y="161.2" fill="#9cc7f5" font-size="2.1">Management Group</text>
        <!-- Policy 盾(統制) -->
        <path d="M98.5 158.4l2.3 .8v1.4c0 1.2-1 2-2.3 2.6-1.3-.6-2.3-1.4-2.3-2.6v-1.4z" fill="none" stroke="#8fd0ff" stroke-width="0.4" />
        <text x="98.5" y="166.2" fill="#9cc7f5" font-size="1.6" text-anchor="middle">Policy</text>

        <!-- サブスクリプション + VNet -->
        <rect x="48" y="167" width="52" height="24" rx="1.4" fill="#4aa3ff" fill-opacity="0.06" stroke="#bcdcff" stroke-width="0.4" />
        <text x="50" y="170.4" fill="#cfe4ff" font-size="1.9">Subscription — dev / prod</text>
        <rect x="50" y="172.5" width="48" height="16.5" rx="1" fill="#8fd0ff" fill-opacity="0.10" stroke="#ffffff" stroke-width="0.4" />
        <text x="51.5" y="175.9" fill="#ffffff" font-size="1.9">VNet 10.0.0.0/16</text>
        <!-- 2 サブネット + NSG -->
        <rect x="51.5" y="177.5" width="21" height="10.5" rx="0.8" fill="none" stroke="#cfe4ff" stroke-width="0.3" stroke-dasharray="1.2 1" />
        <text x="53.5" y="180.9" fill="#cfe4ff" font-size="1.6">snet-app</text>
        <rect x="53" y="184" width="6.5" height="2.8" rx="0.5" fill="#8fd0ff" /><text x="56.2" y="186.1" fill="#06254a" font-size="1.4" text-anchor="middle">NSG</text>
        <rect x="75.5" y="177.5" width="21" height="10.5" rx="0.8" fill="none" stroke="#cfe4ff" stroke-width="0.3" stroke-dasharray="1.2 1" />
        <text x="77.5" y="180.9" fill="#cfe4ff" font-size="1.6">snet-data</text>
        <rect x="89" y="184" width="6.5" height="2.8" rx="0.5" fill="#8fd0ff" /><text x="92.2" y="186.1" fill="#06254a" font-size="1.4" text-anchor="middle">NSG</text>

        <!-- 診断ログ 矢印 → 右: Log Analytics -->
        <path d="M103 180H110" fill="none" stroke="#8fd0ff" stroke-width="0.4" marker-end="url(#arrow)" stroke-dasharray="1.4 1" />
        <text x="106.5" y="178" fill="#9cc7f5" font-size="1.7" text-anchor="middle">logs</text>
        <rect x="111" y="171" width="22" height="18" rx="1.4" fill="#4aa3ff" fill-opacity="0.06" stroke="#9cccf5" stroke-width="0.4" />
        <g stroke="#8fd0ff" stroke-width="0.7" fill="none">
          <path d="M117.5 183.5V180.5M120 183.5V178.5M122.5 183.5V181.5M125 183.5V179.5" />
        </g>
        <text x="122" y="187.2" fill="#dce9fb" font-size="1.9" text-anchor="middle">Log Analytics</text>

        <!-- 下端メタ -->
        <line x1="16" y1="199" x2="132" y2="199" stroke="#5f9ad6" stroke-width="0.2" stroke-opacity="0.5" />
        <text x="16" y="204.5" fill="#cfe4ff" font-size="2.4">y-oga-819</text>
        <text x="132" y="204.5" fill="#9cc7f5" font-size="2.1" text-anchor="end">Bicep でコード化して再現</text>
      </g>
    </svg>
  </body>
</html>
