<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>表紙(ラスタライズ元)</title>
    <!--
      表紙画像(assets/cover.png)の生成元。Chromium で 1748×2480px(A5・300dpi)
      にスクリーンショットして assets/cover.png を作る(scripts/build-cover.sh)。
      構図: 上3/5=白地にタイトル主役 / 下2/5=ブループリント地に「左:リソース一覧 / 右:構成図」。
      SVG 座標系は viewBox="0 0 148 210"(A5 を mm で扱う)。
    -->
    <style>
      html, body { margin: 0; padding: 0; background: #ffffff; }
      svg { display: block; width: 1748px; height: 2480px; }
    </style>
  </head>
  <body>
    <svg
      viewBox="0 0 148 210"
      xmlns="http://www.w3.org/2000/svg"
      font-family="'Hiragino Kaku Gothic ProN','Noto Sans CJK JP','Yu Gothic','Meiryo',sans-serif"
    >
      <defs>
        <linearGradient id="bgstrip" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#0c4680" />
          <stop offset="1" stop-color="#07264a" />
        </linearGradient>
        <pattern id="grid-minor" width="4" height="4" patternUnits="userSpaceOnUse">
          <path d="M4 0H0V4" fill="none" stroke="#8fc3ff" stroke-width="0.12" stroke-opacity="0.14" />
        </pattern>
        <pattern id="grid-major" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M20 0H0V20" fill="none" stroke="#8fc3ff" stroke-width="0.2" stroke-opacity="0.26" />
        </pattern>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M0 1L9 5L0 9" fill="none" stroke="#8fd0ff" stroke-width="1.6" />
        </marker>
      </defs>

      <!-- ===== 上3/5: 白地・タイトル ===== -->
      <rect x="0" y="0" width="148" height="210" fill="#ffffff" />
      <rect x="0" y="0" width="148" height="2.4" fill="#0a5ca8" />

      <!-- キッカー(AWS 経験者 は AWS オレンジの差し色) -->
      <text x="16" y="40" font-size="4.8" letter-spacing="0.4"><tspan fill="#ec7211" font-weight="bold">AWS 経験者</tspan><tspan fill="#40638a">のための</tspan></text>

      <!-- タイトル(主役・背景色の青で特大) -->
      <text x="15" y="67" fill="#0a5ca8" font-size="23" font-weight="bold" letter-spacing="0.2">Azure</text>
      <text x="15" y="93" fill="#0a5ca8" font-size="23" font-weight="bold" letter-spacing="1.5">実践入門</text>

      <!-- 巻バッジ -->
      <rect x="16" y="101" width="33" height="9.2" rx="1.4" fill="#0a5ca8" />
      <text x="32.5" y="107.5" fill="#ffffff" font-size="4.4" font-weight="bold" text-anchor="middle">共通基礎編</text>

      <!-- ===== 下2/5: ブループリント地 ===== -->
      <g>
        <rect x="0" y="126" width="148" height="84" fill="url(#bgstrip)" />
        <rect x="0" y="126" width="148" height="84" fill="url(#grid-minor)" />
        <rect x="0" y="126" width="148" height="84" fill="url(#grid-major)" />
        <rect x="0" y="126" width="148" height="0.5" fill="#4db8ff" />

        <!-- 左: 構築するリソース一覧 -->
        <text x="16" y="137" fill="#7fc0ff" font-size="2.5" letter-spacing="0.4">本書で構築するリソース</text>
        <line x1="16" y1="139.5" x2="49" y2="139.5" stroke="#5f9ad6" stroke-width="0.2" stroke-opacity="0.6" />
        <g font-size="2.5" fill="#e6f1ff">
          <rect x="16" y="146.4" width="1.7" height="1.7" fill="#4db8ff" /><text x="19.5" y="148.2">Microsoft Entra ID</text>
          <rect x="16" y="155.9" width="1.7" height="1.7" fill="#4db8ff" /><text x="19.5" y="157.7">Azure Policy</text>
          <rect x="16" y="165.4" width="1.7" height="1.7" fill="#4db8ff" /><text x="19.5" y="167.2">VNet / Subnet / NSG</text>
          <rect x="16" y="174.9" width="1.7" height="1.7" fill="#4db8ff" /><text x="19.5" y="176.7">Log Analytics / 予算</text>
          <rect x="16" y="184.4" width="1.7" height="1.7" fill="#4db8ff" /><text x="19.5" y="186.2">Bicep(IaC)</text>
        </g>
        <text x="16" y="205.5" fill="#9cc7f5" font-size="2.2">y-oga-819</text>

        <!-- 区切り -->
        <line x1="53" y1="132" x2="53" y2="204" stroke="#5f9ad6" stroke-width="0.2" stroke-opacity="0.35" />

        <!-- 右: 構成図(Entra=テナント / MG に dev・prod サブスクリプションを分けて配置 / 共有 Log Analytics) -->
        <!-- Entra ID(テナント全体) -->
        <rect x="58" y="134" width="72" height="6.2" rx="1.2" fill="#4aa3ff" fill-opacity="0.08" stroke="#9cccf5" stroke-width="0.4" />
        <g stroke="#8fd0ff" stroke-width="0.45" fill="none">
          <circle cx="62" cy="137.1" r="1.5" /><path d="M63.5 137.1H66.5M65.6 137.1V138.6" />
        </g>
        <text x="68" y="138.1" fill="#dce9fb" font-size="2">Microsoft Entra ID ・ テナント</text>

        <!-- RBAC 矢印(テナント → 管理グループ) -->
        <path d="M82 140.6V145" fill="none" stroke="#8fd0ff" stroke-width="0.4" marker-end="url(#arrow)" />
        <text x="84" y="144" fill="#9cc7f5" font-size="1.7">RBAC</text>

        <!-- 管理グループ -->
        <rect x="58" y="146" width="52" height="56" rx="1.8" fill="#4aa3ff" fill-opacity="0.05" stroke="#7fb8f0" stroke-width="0.4" stroke-dasharray="2 1.4" />
        <text x="60.5" y="150.2" fill="#9cc7f5" font-size="2">Management Group</text>
        <path d="M104.6 147.2l2.2 .7v1.3c0 1.1-.9 1.9-2.2 2.5-1.3-.6-2.2-1.4-2.2-2.5v-1.3z" fill="none" stroke="#8fd0ff" stroke-width="0.4" />
        <text x="104.6" y="155" fill="#9cc7f5" font-size="1.5" text-anchor="middle">Policy</text>

        <!-- dev サブスクリプション -->
        <rect x="61" y="153" width="45" height="21" rx="1.3" fill="#4aa3ff" fill-opacity="0.06" stroke="#bcdcff" stroke-width="0.4" />
        <text x="63" y="156.4" fill="#cfe4ff" font-size="1.8">Subscription ・ dev</text>
        <rect x="63" y="158" width="41" height="13.5" rx="1" fill="#8fd0ff" fill-opacity="0.10" stroke="#ffffff" stroke-width="0.4" />
        <text x="64.3" y="161" fill="#ffffff" font-size="1.7">VNet 10.0.0.0/16 ・ NSG</text>
        <rect x="64.3" y="162.5" width="18" height="7.6" rx="0.7" fill="none" stroke="#cfe4ff" stroke-width="0.3" stroke-dasharray="1.1 0.9" />
        <text x="65.6" y="166" fill="#cfe4ff" font-size="1.5">snet-app</text>
        <rect x="84" y="162.5" width="18" height="7.6" rx="0.7" fill="none" stroke="#cfe4ff" stroke-width="0.3" stroke-dasharray="1.1 0.9" />
        <text x="85.3" y="166" fill="#cfe4ff" font-size="1.5">snet-data</text>

        <!-- prod サブスクリプション -->
        <rect x="61" y="177" width="45" height="21" rx="1.3" fill="#4aa3ff" fill-opacity="0.06" stroke="#bcdcff" stroke-width="0.4" />
        <text x="63" y="180.4" fill="#cfe4ff" font-size="1.8">Subscription ・ prod</text>
        <rect x="63" y="182" width="41" height="13.5" rx="1" fill="#8fd0ff" fill-opacity="0.10" stroke="#ffffff" stroke-width="0.4" />
        <text x="64.3" y="185" fill="#ffffff" font-size="1.7">VNet 10.1.0.0/16 ・ NSG</text>
        <rect x="64.3" y="186.5" width="18" height="7.6" rx="0.7" fill="none" stroke="#cfe4ff" stroke-width="0.3" stroke-dasharray="1.1 0.9" />
        <text x="65.6" y="190" fill="#cfe4ff" font-size="1.5">snet-app</text>
        <rect x="84" y="186.5" width="18" height="7.6" rx="0.7" fill="none" stroke="#cfe4ff" stroke-width="0.3" stroke-dasharray="1.1 0.9" />
        <text x="85.3" y="190" fill="#cfe4ff" font-size="1.5">snet-data</text>

        <!-- 共有 Log Analytics(dev・prod 両方から診断ログ) -->
        <path d="M106 163.5C110 165 111 168 112.5 171" fill="none" stroke="#8fd0ff" stroke-width="0.35" stroke-dasharray="1.2 0.9" marker-end="url(#arrow)" />
        <path d="M106 187.5C110 186 111 183 112.5 180" fill="none" stroke="#8fd0ff" stroke-width="0.35" stroke-dasharray="1.2 0.9" marker-end="url(#arrow)" />
        <text x="110.5" y="176.4" fill="#9cc7f5" font-size="1.6">logs</text>
        <rect x="114" y="168" width="17" height="15" rx="1.3" fill="#4aa3ff" fill-opacity="0.06" stroke="#9cccf5" stroke-width="0.4" />
        <g stroke="#8fd0ff" stroke-width="0.6" fill="none">
          <path d="M119 178V175.5M121.3 178V173.5M123.6 178V176.5M125.9 178V174.5" />
        </g>
        <text x="122.5" y="181.4" fill="#dce9fb" font-size="1.6" text-anchor="middle">Log Analytics</text>
      </g>
    </svg>
  </body>
</html>
