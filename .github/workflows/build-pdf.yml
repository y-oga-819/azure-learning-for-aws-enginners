name: build-pdf

# Vivliostyle で PDF を組版する。push / PR で実行する。
# - PDF を Artifact として保存(全実行)
# - PR ではレイアウト確認用のプレビュー画像(先頭数ページの PNG)も生成し、
#   PDF・画像の取得先を PR にコメントする(レイアウトを PR 単位で確認できる)
# ビルド失敗(リンク切れ・設定エラー・組版エラー)で PR を落とす。

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 日本語(CJK)フォントを入れないと組版で豆腐(□)になる
      - name: Install Japanese fonts & poppler
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk poppler-utils

      # Vivliostyle は playwright-core の Chromium で組版する
      - name: Install Chromium for Vivliostyle
        run: npx playwright-core install --with-deps chromium

      - name: Build PDF
        run: npm run build

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-kyotsu-kiso-pdf
          path: output/azure-kyotsu-kiso.pdf
          if-no-files-found: error

      # ---- ここから PR のときだけ:レイアウトプレビュー ----
      - name: Render preview images (先頭8ページ)
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p preview
          pdftoppm -png -r 110 -f 1 -l 8 output/azure-kyotsu-kiso.pdf preview/page
          ls -la preview

      - name: Upload preview images artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pdf-layout-preview
          path: preview/*.png
          if-no-files-found: warn

      - name: Comment preview link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- vivliostyle-preview -->';
            const body = [
              marker,
              '### 📄 組版プレビュー(この PR の PDF)',
              '',
              'この PR の原稿を Vivliostyle で組版しました。実際のレイアウトを確認できます。',
              '',
              `- **PDF をダウンロード**: [${runUrl}](${runUrl}) の Artifacts → \`azure-kyotsu-kiso-pdf\``,
              `- **ページ画像プレビュー**: 同じ実行の Artifacts → \`pdf-layout-preview\`(先頭8ページの PNG)`,
              '',
              '_このコメントはビルドごとに自動更新されます。_',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
