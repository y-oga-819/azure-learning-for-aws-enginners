name: lint

# 原稿の文章チェック。push / PR で実行する。
# - textlint(表記ゆれ・文体・技術文書ルール)  … 失敗で PR を落とす
# - リンク切れチェック(ローカル参照)          … 失敗で PR を落とす
# - 「要検証」マーカーの集計                     … レポートのみ(落とさない)

on:
  push:
    branches: [main]
    paths:
      - 'manuscripts/**'
      - 'shared/**'
      - '.textlintrc.json'
      - 'prh.yml'
      - 'scripts/**'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'manuscripts/**'
      - 'shared/**'
      - '.textlintrc.json'
      - 'prh.yml'
      - 'scripts/**'
      - '.github/workflows/lint.yml'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: textlint(表記ゆれ・文体)
        run: npm run lint

      - name: リンク切れチェック
        run: npm run check:links

      - name: 「要検証」マーカー集計(レポートのみ)
        if: always()
        run: |
          npm run check:todo | tee todo-report.txt
          {
            echo '## 「要検証」マーカーの残存状況'
            echo ''
            echo '```'
            cat todo-report.txt
            echo '```'
            echo ''
            echo '> 発行前に 0 件にする運用です(このチェックは PR を落としません)。'
          } >> "$GITHUB_STEP_SUMMARY"
